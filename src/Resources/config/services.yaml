services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    # Make services in src/ available for dependency injection
    ChauhanMukesh\StudioTodoBundle\:
        resource: '../../*'
        exclude: '../../{DependencyInjection,Entity,Model,Enum,Resources,StudioTodoBundle.php}'

    # Repository Services
    ChauhanMukesh\StudioTodoBundle\Repository\TodoRepository:
        arguments:
            $connection: '@doctrine.dbal.default_connection'
        public: true

    ChauhanMukesh\StudioTodoBundle\Repository\AuditRepository:
        arguments:
            $connection: '@doctrine.dbal.default_connection'
        public: true

    # Core Services
    ChauhanMukesh\StudioTodoBundle\Service\TodoManager:
        arguments:
            $repository: '@ChauhanMukesh\StudioTodoBundle\Repository\TodoRepository'
            $auditLogger: '@ChauhanMukesh\StudioTodoBundle\Service\AuditLogger'
            $eventDispatcher: '@event_dispatcher'
            $messageBus: '@messenger.default_bus'
            $config: '%studio_todo.config%'
        public: true

    ChauhanMukesh\StudioTodoBundle\Service\AuditLogger:
        arguments:
            $repository: '@ChauhanMukesh\StudioTodoBundle\Repository\AuditRepository'
            $config: '%studio_todo.audit%'
        public: true

    ChauhanMukesh\StudioTodoBundle\Service\StatisticsService:
        arguments:
            $repository: '@ChauhanMukesh\StudioTodoBundle\Repository\TodoRepository'
            $cache: '@cache.app'
            $config: '%studio_todo.cache%'
        public: true

    # Controllers
    ChauhanMukesh\StudioTodoBundle\Controller\Api\TodoController:
        arguments:
            $todoManager: '@ChauhanMukesh\StudioTodoBundle\Service\TodoManager'
            $repository: '@ChauhanMukesh\StudioTodoBundle\Repository\TodoRepository'
        tags: ['controller.service_arguments']
        public: true

    ChauhanMukesh\StudioTodoBundle\Controller\Api\AuditController:
        arguments:
            $auditRepository: '@ChauhanMukesh\StudioTodoBundle\Repository\AuditRepository'
        tags: ['controller.service_arguments']
        public: true

    ChauhanMukesh\StudioTodoBundle\Controller\Api\StatsController:
        arguments:
            $statsService: '@ChauhanMukesh\StudioTodoBundle\Service\StatisticsService'
        tags: ['controller.service_arguments']
        public: true

    # Commands
    ChauhanMukesh\StudioTodoBundle\Command\ListCommand:
        arguments:
            $repository: '@ChauhanMukesh\StudioTodoBundle\Repository\TodoRepository'
        tags: ['console.command']

    ChauhanMukesh\StudioTodoBundle\Command\CreateCommand:
        arguments:
            $todoManager: '@ChauhanMukesh\StudioTodoBundle\Service\TodoManager'
        tags: ['console.command']

    ChauhanMukesh\StudioTodoBundle\Command\CleanupCommand:
        arguments:
            $repository: '@ChauhanMukesh\StudioTodoBundle\Repository\TodoRepository'
            $todoManager: '@ChauhanMukesh\StudioTodoBundle\Service\TodoManager'
            $config: '%studio_todo.soft_delete%'
        tags: ['console.command']

    ChauhanMukesh\StudioTodoBundle\Command\StatsCommand:
        arguments:
            $statsService: '@ChauhanMukesh\StudioTodoBundle\Service\StatisticsService'
        tags: ['console.command']

    # Event Listeners
    ChauhanMukesh\StudioTodoBundle\EventListener\TodoEventListener:
        arguments:
            $auditLogger: '@ChauhanMukesh\StudioTodoBundle\Service\AuditLogger'
        tags:
            - { name: kernel.event_listener, event: studio_todo.created, method: onTodoCreated }
            - { name: kernel.event_listener, event: studio_todo.updated, method: onTodoUpdated }
            - { name: kernel.event_listener, event: studio_todo.deleted, method: onTodoDeleted }
            - { name: kernel.event_listener, event: studio_todo.completed, method: onTodoCompleted }
            - { name: kernel.event_listener, event: studio_todo.restored, method: onTodoRestored }

    # Message Handlers
    ChauhanMukesh\StudioTodoBundle\MessageHandler\TodoOperationHandler:
        arguments:
            $todoManager: '@ChauhanMukesh\StudioTodoBundle\Service\TodoManager'
        tags: ['messenger.message_handler']
